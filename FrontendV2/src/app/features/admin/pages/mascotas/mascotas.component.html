<app-admin-navbar />

<main class="admin-pets-page py-5 bg-light min-vh-100">
  <div class="container">
    <div
      class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3"
    >
      <div>
        <h1 class="fw-bold h2 mb-1">Mascotas y Publicaciones</h1>
        <p class="text-muted mb-0">
          Gestiona las solicitudes de la comunidad y el catálogo público.
        </p>
      </div>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <div class="d-flex align-items-center gap-2 bg-white p-2 rounded-3 border shadow-sm">
          <i class="bi bi-sort-alpha-down text-primary ms-2"></i>
          <select
            class="form-select form-select-sm border-0 shadow-none w-auto"
            [(ngModel)]="sortOrder"
            (change)="renderGrid()"
          >
            <option value="recent">Más recientes</option>
            <option value="alphabetical">Nombre (A-Z)</option>
          </select>
        </div>

        <button
          class="btn btn-pdf d-flex align-items-center gap-2 shadow-sm"
          (click)="generatePDF()"
          title="Generar PDF con mascotas publicadas y adoptadas"
        >
          <i class="bi bi-file-earmark-pdf-fill"></i>
          <span>Generar reporte</span>
        </button>
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-body p-0">
        <div id="pets-table-wrapper"></div>
      </div>
    </div>
  </div>
</main>
