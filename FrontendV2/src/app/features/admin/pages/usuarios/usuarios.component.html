<app-admin-navbar />

<section class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Gestión de Usuarios</h2>
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small">Ordenar por:</span>
      <select
        class="form-select form-select-sm w-auto"
        [(ngModel)]="sortOrder"
        (change)="renderGrid()"
      >
        <option value="recent">Más recientes</option>
        <option value="alphabetical">Nombre (A-Z)</option>
      </select>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card mb-4 p-3">
    <h5>{{ editUserId ? 'Editar Usuario' : 'Agregar Usuario' }}</h5>

    <div class="row g-2">
      <div class="col-md-2">
        <input class="form-control" placeholder="Nombre" [(ngModel)]="newUser.name" />
      </div>
      <div class="col-md-2">
        <input class="form-control" placeholder="Apellido" [(ngModel)]="newUser.last_name" />
      </div>
      <div class="col-md-3">
        <input class="form-control" type="email" placeholder="Correo" [(ngModel)]="newUser.email" />
      </div>
      <div class="col-md-2">
        <input
          class="form-control"
          type="password"
          placeholder="Contraseña"
          [(ngModel)]="newUser.password"
          (focus)="showPasswordReq = true"
        />
      </div>
      <div class="col-md-2">
        <select class="form-select" [(ngModel)]="newUser.role">
          <option>Admin</option>
          <option>Usuario</option>
          <option>SUPERADMIN</option>
        </select>
      </div>
    </div>

    <app-password-requirements
      *ngIf="showPasswordReq && newUser.password"
      [password]="newUser.password"
    />

    <div class="mt-3">
      <ng-container *ngIf="editUserId; else addBtn">
        <button class="btn btn-success me-2 px-4 shadow-sm" (click)="saveEdit()">
          <i class="bi bi-save me-1"></i> Guardar Cambios
        </button>
        <button class="btn btn-light border px-4" (click)="cancelEdit()">Cancelar</button>
      </ng-container>
      <ng-template #addBtn>
        <button class="btn btn-primary px-4 shadow-sm" (click)="addUser()">
          <i class="bi bi-person-plus-fill me-1"></i> Agregar Usuario
        </button>
      </ng-template>
    </div>
  </div>

  <!-- DataTable -->
  <div id="table-wrapper"></div>
</section>
